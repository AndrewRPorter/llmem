name: Release

on:
    push:
        paths:
            - "VERSION"
        branches:
            - main

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - goos: linux
                      goarch: amd64
                    - goos: linux
                      goarch: arm64
                    - goos: darwin
                      goarch: amd64
                    - goos: darwin
                      goarch: arm64

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod

            - name: Read version
              id: version
              run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

            - name: Build
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
              run: |
                  go build -o llmem .
                  tar -czf llmem_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz llmem

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: llmem_${{ matrix.goos }}_${{ matrix.goarch }}
                  path: llmem_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

    publish:
        needs: release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Read version
              id: version
              run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: Create tag
              run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git tag -f "v${{ steps.version.outputs.version }}"
                  git push -f origin "v${{ steps.version.outputs.version }}"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.version.outputs.version }}
                  name: v${{ steps.version.outputs.version }}
                  generate_release_notes: true
                  files: dist/*
